[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/profile.html"
  status = 200

# 토스페이먼츠 결제위젯 페이지 (정적 HTML). SPA catch-all 보다 먼저 매칭되어야 한다.
[[redirects]]
  from = "/checkout"
  to = "/checkout.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/fail"
  to = "/fail.html"
  status = 200

# 토스페이먼츠 직접 연동(카드) 결제 후 돌아오는 정적 페이지. SPA catch-all 보다 먼저 매칭.
[[redirects]]
  from = "/toss/return"
  to = "/toss-return.html"
  status = 200

[[redirects]]
  from = "/toss/fail"
  to = "/toss-fail.html"
  status = 200

[[redirects]]
  from = "/auth-callback"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/membership"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/index.html"
  status = 200

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
