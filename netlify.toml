[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/profile.html"
  status = 200

[[redirects]]
  from = "/api/kakao/callback"
  to = "/.netlify/functions/kakao-login-callback"
  status = 200

[[redirects]]
  from = "/auth-callback"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/membership"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/index.html"
  status = 200

# Existing .mts functions with query-param routing (backwards compatibility)
[[redirects]]
  from = "/.netlify/functions/api-collabs"
  to = "/.netlify/functions/api-collabs"
  status = 200

[[redirects]]
  from = "/.netlify/functions/api-proposals"
  to = "/.netlify/functions/api-proposals"
  status = 200

[[redirects]]
  from = "/.netlify/functions/api-settlements"
  to = "/.netlify/functions/api-settlements"
  status = 200

[[redirects]]
  from = "/.netlify/functions/api-live-sessions"
  to = "/.netlify/functions/api-live-sessions"
  status = 200

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
