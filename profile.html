<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2563EB">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%232563EB%22/></svg>">
    <title>PICKSFOLIO | 프로필</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .profile-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .cover-section {
            position: relative;
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1e1b4b, #312e81, #1E3A8A);
            overflow: hidden;
        }

        .cover-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            padding: 0 1.25rem;
            margin-top: -2rem;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid #0a0a1a;
            background: linear-gradient(135deg, #60A5FA, #2563EB);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
        }

        .user-name {
            font-size: 1.25rem;
            font-weight: 800;
            margin-top: 0.75rem;
            letter-spacing: -0.02em;
        }

        .user-handle {
            font-size: 0.8125rem;
            color: #64748b;
            font-weight: 500;
            margin-top: 0.125rem;
        }

        .user-bio {
            font-size: 0.8125rem;
            color: #94a3b8;
            font-weight: 400;
            margin-top: 0.5rem;
            line-height: 1.5;
        }

        .category-tabs {
            display: flex;
            gap: 0;
            padding: 0 1.25rem;
            margin-top: 1.5rem;
            border-bottom: 1px solid #1e293b;
        }

        .category-tab {
            padding: 0.625rem 0.875rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .category-tab:hover {
            color: #94a3b8;
        }

        .category-tab.active {
            color: #ffffff;
        }

        .category-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(135deg, #60A5FA, #2563EB);
            border-radius: 1px;
        }

        .content-section {
            padding: 1rem 1.25rem;
        }

        .grid-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.375rem;
        }

        .grid-item {
            aspect-ratio: 1;
            border-radius: 0.5rem;
            overflow: hidden;
            background: #1e1b4b;
            position: relative;
        }

        .grid-item-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            opacity: 0.3;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #475569;
            font-size: 0.8125rem;
            font-weight: 400;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 0.625rem 0;
            padding-bottom: max(0.625rem, env(safe-area-inset-bottom));
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            color: #475569;
            font-size: 0.625rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #60A5FA;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="cover-section"></div>

        <div class="profile-info">
            <div class="avatar">P</div>
            <div class="user-name">Picksfolio</div>
            <div class="user-handle">@picksfolio</div>
            <div class="user-bio">일상을 큐레이션하다. 감각적인 취향을 공유합니다.</div>
        </div>

        <div class="category-tabs">
            <div class="category-tab active" data-tab="all">전체</div>
            <div class="category-tab" data-tab="product">상품</div>
            <div class="category-tab" data-tab="portfolio">포트폴리오</div>
            <div class="category-tab" data-tab="link">링크</div>
            <div class="category-tab" data-tab="content">콘텐츠</div>
        </div>

        <div class="content-section" id="tab-content">
            <div class="grid-items">
                <div class="grid-item"><div class="grid-item-placeholder">+</div></div>
                <div class="grid-item"><div class="grid-item-placeholder">+</div></div>
                <div class="grid-item"><div class="grid-item-placeholder">+</div></div>
                <div class="grid-item"><div class="grid-item-placeholder">+</div></div>
                <div class="grid-item"><div class="grid-item-placeholder">+</div></div>
                <div class="grid-item"><div class="grid-item-placeholder">+</div></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/" class="nav-item">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955a1.126 1.126 0 0 1 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
            <span>홈</span>
        </a>
        <a href="#" class="nav-item">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
            <span>탐색</span>
        </a>
        <a href="/profile" class="nav-item active">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
            <span>프로필</span>
        </a>
        <a href="#" class="nav-item">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.431.992a7.723 7.723 0 0 1 0 .255c-.007.378.138.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
            <span>설정</span>
        </a>
    </div>

    <script>
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderBlocks(tab.dataset.tab);
            });
        });

        let allBlocks = [];
        let profileData = null;

        async function loadProfile() {
            const session = localStorage.getItem('picks_user_session');
            if (!session) return;

            try {
                const res = await fetch('/api/site/' + encodeURIComponent(session.toLowerCase()));
                if (res.ok) {
                    const data = await res.json();
                    profileData = data;
                    allBlocks = data.blocks || [];

                    if (data.profile) {
                        const nameEl = document.querySelector('.user-name');
                        const handleEl = document.querySelector('.user-handle');
                        const bioEl = document.querySelector('.user-bio');
                        const avatarEl = document.querySelector('.avatar');

                        if (nameEl) nameEl.textContent = data.profile.name || session;
                        if (handleEl) handleEl.textContent = '@' + session;
                        if (bioEl) bioEl.textContent = data.profile.bio || '';

                        if (data.profile.avatar_url && avatarEl) {
                            avatarEl.innerHTML = '';
                            const img = document.createElement('img');
                            img.src = data.profile.avatar_url;
                            img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
                            img.referrerPolicy = 'no-referrer';
                            avatarEl.appendChild(img);
                        } else if (avatarEl) {
                            avatarEl.textContent = (data.profile.name || session).charAt(0).toUpperCase();
                        }
                    }

                    if (data.design && data.design.portfolioHeaderImage) {
                        const cover = document.querySelector('.cover-section');
                        if (cover) {
                            cover.innerHTML = '';
                            const img = document.createElement('img');
                            img.src = data.design.portfolioHeaderImage;
                            img.style.cssText = 'width:100%;height:100%;object-fit:cover';
                            img.referrerPolicy = 'no-referrer';
                            cover.appendChild(img);
                        }
                    }

                    renderBlocks('all');
                }
            } catch (err) {
                console.error('Failed to load profile:', err);
            }
        }

        function renderBlocks(tab) {
            const container = document.getElementById('tab-content');
            let filtered = allBlocks;
            if (tab !== 'all') {
                filtered = allBlocks.filter(b => {
                    const cat = (b.category || b.type || '').toLowerCase();
                    return cat === tab || cat.includes(tab);
                });
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">등록된 콘텐츠가 없습니다.</div>';
                return;
            }

            let html = '<div class="grid-items">';
            filtered.forEach(block => {
                const img = block.coverMedia || block.image_url || block.thumbnail || '';
                const title = block.title || '';
                if (img) {
                    html += '<div class="grid-item" title="' + title.replace(/"/g, '&quot;') + '">'
                        + '<img src="' + img + '" style="width:100%;height:100%;object-fit:cover" referrerpolicy="no-referrer" loading="lazy">'
                        + '</div>';
                } else {
                    html += '<div class="grid-item"><div class="grid-item-placeholder">' + (title.charAt(0) || '+') + '</div></div>';
                }
            });
            html += '</div>';
            container.innerHTML = html;
        }

        loadProfile();
    </script>
</body>
</html>
