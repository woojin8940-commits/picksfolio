    <meta property="og:description" content="단 하나의 링크, PICKS. 무신사-올리브영 데이터로 픽하고, 감각적인 그리드 템플릿으로 연결하세요." />

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script src="/campaign-inject.js" defer></script>
    <script>
    window.__picksLinkAccount=function(username,kakaoUserId){
      return new Promise(function(resolve){
        var overlay=document.createElement("div");
        overlay.style.cssText="position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:24px";
        overlay.innerHTML='<div style="background:#fff;border-radius:24px;padding:32px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)">'
          +'<h3 style="font-size:18px;font-weight:900;color:#1e293b;margin:0 0 8px">기존 계정 연동</h3>'
          +'<p style="font-size:13px;color:#64748b;margin:0 0 20px;line-height:1.5"><b>'+username+'</b> 계정이 이미 존재합니다.<br>비밀번호를 입력하면 카카오 계정과 연동됩니다.</p>'
          +'<input id="__picks_link_pw" type="password" placeholder="기존 계정 비밀번호" style="width:100%;box-sizing:border-box;padding:14px 16px;border:1px solid #e2e8f0;border-radius:12px;font-size:15px;outline:none;margin-bottom:8px">'
          +'<p id="__picks_link_err" style="font-size:12px;color:#ef4444;margin:0 0 16px;min-height:18px"></p>'
          +'<div style="display:flex;gap:10px">'
          +'<button id="__picks_link_cancel" style="flex:1;padding:14px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;font-size:15px;font-weight:700;color:#64748b;cursor:pointer">취소</button>'
          +'<button id="__picks_link_ok" style="flex:1;padding:14px;border-radius:12px;border:none;background:#2563EB;font-size:15px;font-weight:700;color:#fff;cursor:pointer">연동하기</button>'
          +'</div></div>';
        document.body.appendChild(overlay);
        var pw=overlay.querySelector("#__picks_link_pw");
        var err=overlay.querySelector("#__picks_link_err");
        var ok=overlay.querySelector("#__picks_link_ok");
        var cancel=overlay.querySelector("#__picks_link_cancel");
        pw.focus();
        function close(result){document.body.removeChild(overlay);resolve(result)}
        cancel.onclick=function(){close(null)};
        overlay.onclick=function(ev){if(ev.target===overlay)close(null)};
        pw.onkeydown=function(ev){if(ev.key==="Enter")doLink()};
        ok.onclick=doLink;
        function doLink(){
          var val=pw.value.trim();
          if(!val){err.textContent="비밀번호를 입력해 주세요.";return}
          ok.disabled=true;ok.textContent="연동 중...";err.textContent="";
          fetch("/api/kakao-link-account",{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({kakao_user_id:kakaoUserId,username:username,password:val})
          }).then(function(r){return r.json()}).then(function(d){
            if(d.success){close(d)}
            else{err.textContent=d.error||"연동에 실패했습니다.";ok.disabled=false;ok.textContent="연동하기"}
          }).catch(function(){err.textContent="네트워크 오류가 발생했습니다.";ok.disabled=false;ok.textContent="연동하기"});
        }
      });
    };
    </script>
</body>
</html>
